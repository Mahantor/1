name: Build APK (Standalone)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: android-actions/setup-android@v3
      
      - name: Create minimal working build.gradle.kts
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GEMINI_API_KEY=dummy_key" > .env
          
          # ساختن فایل build.gradle.kts ساده و مستقل
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          
          android {
              namespace = "com.example.app"
              compileSdk = 34
              
              defaultConfig {
                  applicationId = "com.example.app"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))
                  }
                  debug {
                      isMinifyEnabled = false
                  }
              }
              
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_11
                  targetCompatibility = JavaVersion.VERSION_11
              }
              
              kotlinOptions {
                  jvmTarget = "11"
              }
          }
          
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
          }
          EOF
          
          # ساختن یک MainActivity ساده برای اینکه بیلد بشه
          mkdir -p app/src/main/java/com/example/app
          cat > app/src/main/java/com/example/app/MainActivity.kt << 'EOF'
          package com.example.app
          
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(android.R.layout.activity_main)
              }
          }
          EOF
          
          # ساختن AndroidManifest.xml ساده
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">
              
              <application
                  android:allowBackup="true"
                  android:icon="@android:drawable/ic_dialog_info"
                  android:label="Test App"
                  android:theme="@android:style/Theme.DeviceDefault">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # حذف فایل های resources که ممکنه مشکل دار باشن
          rm -rf app/src/main/res 2>/dev/null || true
          
          echo "✅ All files created"
      
      - name: Setup Gradle 9.3.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          unzip -q gradle-9.3.1-bin.zip
          echo "$(pwd)/gradle-9.3.1/bin" >> $GITHUB_PATH
      
      - name: Build APK
        run: gradle assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
