name: Build Simple APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create clean project structure
        run: |
          # Clear everything and start fresh
          rm -rf app/build
          rm -f app/build.gradle.kts
          rm -rf app/src
          
          # Create minimal Android project
          mkdir -p app/src/main/java/com/test/app
          mkdir -p app/src/main/res/values
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.test.app">
              
              <application
                  android:allowBackup="true"
                  android:label="Test App"
                  android:theme="@android:style/Theme.DeviceDefault">
                  
                  <activity android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create simple MainActivity.java (using Java instead of Kotlin to avoid Kotlin plugin)
          cat > app/src/main/java/com/test/app/MainActivity.java << 'EOF'
          package com.test.app;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("Hello World!");
                  setContentView(tv);
              }
          }
          EOF
          
          # Create simple build.gradle (using Groovy instead of Kotlin DSL)
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdkVersion 34
              
              defaultConfig {
                  applicationId "com.test.app"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          # Create settings.gradle
          cat > settings.gradle << 'EOF'
          rootProject.name = "MyApp"
          include ':app'
          EOF
          
          # Create top-level build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          echo "✅ Clean project created"
      
      - name: Build APK
        run: |
          # Download and use Gradle
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          export PATH=$(pwd)/gradle-8.0/bin:$PATH
          
          # Build
          gradle assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-app-debug
          path: app/build/outputs/apk/debug/*.apk
