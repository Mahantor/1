name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # اجازه اجرای دستی از تب Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ Checkout code (دریافت کدها)
        uses: actions/checkout@v4

      - name: 2️⃣ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3️⃣ Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 4️⃣ Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 5️⃣ Create .env file (برای API Key)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          cat .env  # فقط برای دیباگ (محتوا رو لاگ نمی‌کنه چون سکریت رو نشون نمیده)

      - name: 6️⃣ Fix build.gradle.kts (حذف خط مشکل‌ساز signingConfig)
        run: |
          # حذف خط حاوی 'signingConfig = signingConfigs.getByName("debugConfig")' از فایل build.gradle.kts
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

      - name: 7️⃣ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 8️⃣ Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
