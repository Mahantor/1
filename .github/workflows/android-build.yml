name: Build APK (Clean)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: android-actions/setup-android@v3
      
      - name: Prepare project files
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
      
      - name: Backup and fix build.gradle.kts
        run: |
          # پشتیبان گرفتن از فایل خراب
          cp app/build.gradle.kts app/build.gradle.kts.broken
          
          # نوشتن یک فایل build.gradle.kts جدید و سالم
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              alias(libs.plugins.android.application)
              alias(libs.plugins.kotlin.android)
              alias(libs.plugins.kotlin.compose)
              alias(libs.plugins.secrets)
          }
          
          android {
              namespace = "com.example.yourapp"
              compileSdk = 35
          
              defaultConfig {
                  applicationId = "com.example.yourapp"
                  minSdk = 24
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
          
                  testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
              }
          
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_11
                  targetCompatibility = JavaVersion.VERSION_11
              }
              kotlinOptions {
                  jvmTarget = "11"
              }
              buildFeatures {
                  compose = true
              }
          }
          
          dependencies {
              implementation(platform(libs.androidx.compose.bom))
              implementation(libs.androidx.core.ktx)
              implementation(libs.androidx.lifecycle.runtime.ktx)
              implementation(libs.androidx.activity.compose)
              implementation(platform(libs.androidx.compose.bom))
              implementation(libs.androidx.compose.ui)
              implementation(libs.androidx.compose.ui.graphics)
              implementation(libs.androidx.compose.ui.tooling.preview)
              implementation(libs.androidx.compose.material3)
              testImplementation(libs.junit)
              androidTestImplementation(libs.androidx.junit)
              androidTestImplementation(libs.androidx.espresso.core)
              androidTestImplementation(platform(libs.androidx.compose.bom))
              androidTestImplementation(libs.androidx.compose.ui.test.junit4)
              debugImplementation(libs.androidx.compose.ui.tooling)
              debugImplementation(libs.androidx.compose.ui.test.manifest)
          }
          EOF
          
          echo "✅ Fixed build.gradle.kts created"
      
      - name: Setup Gradle 9.3.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          unzip -q gradle-9.3.1-bin.zip
          echo "$(pwd)/gradle-9.3.1/bin" >> $GITHUB_PATH
      
      - name: Build APK
        run: gradle assembleDebug --no-daemon
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
