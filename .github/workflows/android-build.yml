name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      
      - name: Create .env file
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env
      
      - name: Fix build.gradle.kts
        run: |
          sed -i '/signingConfig/d' app/build.gradle.kts 2>/dev/null || true
      
      - name: Setup Gradle 9.3.1
        run: |
          # نصب gradle 9.3.1 مستقیم
          wget https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          unzip gradle-9.3.1-bin.zip
          echo "$(pwd)/gradle-9.3.1/bin" >> $GITHUB_PATH
          echo "✅ Gradle 9.3.1 installed"
      
      - name: Build APK with Gradle
        run: |
          # استفاده از gradle نصب شده به جای wrapper
          gradle assembleDebug --stacktrace --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
